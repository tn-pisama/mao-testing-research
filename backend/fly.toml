app = 'mao-api'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python -m alembic upgrade head"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "10s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
