apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pisama.backend.name" . }}
  labels:
    {{- include "pisama.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "pisama.backend.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "pisama.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "pisama.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "pisama.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - backend
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pisama.configmap.name" . }}
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pisama.secret.name" . }}
                  key: database-password
            - name: DATABASE_URL
              value: {{ include "pisama.database.url" . | quote }}
            - name: REDIS_URL
              value: {{ include "pisama.redis.url" . | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pisama.secret.name" . }}
                  key: jwt-secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pisama.secret.name" . }}
                  key: anthropic-api-key
                  optional: true
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pisama.secret.name" . }}
                  key: clerk-secret-key
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pisama.secret.name" . }}
                  key: stripe-secret-key
                  optional: true
            # Feature flags
            - name: FEATURE_ML_DETECTION
              value: {{ .Values.featureFlags.mlDetection | quote }}
            - name: FEATURE_ADVANCED_EVALS
              value: {{ .Values.featureFlags.advancedEvals | quote }}
            - name: FEATURE_CHAOS_ENGINEERING
              value: {{ .Values.featureFlags.chaosEngineering | quote }}
            - name: FEATURE_REGRESSION_TESTING
              value: {{ .Values.featureFlags.regressionTesting | quote }}
            - name: FEATURE_TRACE_REPLAY
              value: {{ .Values.featureFlags.traceReplay | quote }}
            - name: FEATURE_COGNITIVE_MEMORY
              value: {{ .Values.featureFlags.cognitiveMemory | quote }}
            - name: FEATURE_QUALITY_ASSESSMENT
              value: {{ .Values.featureFlags.qualityAssessment | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: {{ .Values.backend.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
