apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pisama.secret.name" . }}
  labels:
    {{- include "pisama.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgresql.enabled }}
  database-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- else }}
  database-password: {{ .Values.externalDatabase.password | b64enc | quote }}
  {{- end }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  {{- else }}
  anthropic-api-key: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.clerkPublishableKey }}
  clerk-publishable-key: {{ .Values.secrets.clerkPublishableKey | b64enc | quote }}
  {{- else }}
  clerk-publishable-key: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.clerkSecretKey }}
  clerk-secret-key: {{ .Values.secrets.clerkSecretKey | b64enc | quote }}
  {{- else }}
  clerk-secret-key: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeSecretKey }}
  stripe-secret-key: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  {{- else }}
  stripe-secret-key: {{ "" | b64enc | quote }}
  {{- end }}
