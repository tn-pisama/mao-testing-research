services:
  - type: web
    name: mao-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mao-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://pisama.ai
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://mao-testing-tuomo-nikulainens-projects.vercel.app

databases:
  - name: mao-db
    plan: free
    databaseName: mao
    user: mao
