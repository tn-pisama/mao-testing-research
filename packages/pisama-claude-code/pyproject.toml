[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pisama-claude-code"
version = "0.1.0"
description = "PISAMA integration for Claude Code - trace capture, failure detection, and self-healing"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "MAO Testing", email = "hello@maotesting.com" }
]
keywords = ["claude", "claude-code", "mao", "testing", "llm", "agent", "observability"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "click>=8.0.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
cloud = ["pisama-core>=0.1.0"]
dev = ["pytest>=7.0.0"]

[project.scripts]
pisama-cc = "pisama_claude_code.cli:main"

[project.urls]
Homepage = "https://github.com/tn-pisama/mao-testing-research"

[tool.hatch.build.targets.wheel]
packages = ["src/pisama_claude_code"]
