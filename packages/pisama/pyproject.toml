[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pisama"
version = "0.2.0"
description = "Multi-agent failure detection for production AI systems"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Pisama Team", email = "team@pisama.ai" }
]
keywords = [
    "ai",
    "agents",
    "monitoring",
    "failure-detection",
    "multi-agent",
    "observability",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "pisama-core>=1.0.0",
    "click>=8.0",
    "rich>=13.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0.0"]
auto = ["pisama-auto>=0.1.0", "opentelemetry-api>=1.20.0", "opentelemetry-sdk>=1.20.0"]

[project.scripts]
pisama = "pisama.cli.main:main"

[project.urls]
Homepage = "https://pisama.ai"
Documentation = "https://docs.pisama.ai"
Repository = "https://github.com/tn-pisama/pisama"

[tool.hatch.build.targets.wheel]
packages = ["src/pisama"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
