[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pisama-moltbot-adapter"
version = "0.1.0"
description = "Moltbot integration adapter for PISAMA - observability bridge for Moltbot agent deployments"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "PISAMA Team", email = "team@pisama.dev" }
]
keywords = [
    "ai",
    "agents",
    "moltbot",
    "clawdbot",
    "observability",
    "monitoring"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "websockets>=12.0",
    "pydantic>=2.0.0",
    "httpx>=0.25.0",
    "pisama-core>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.12.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[project.urls]
Homepage = "https://pisama.dev"
Repository = "https://github.com/tn-pisama/pisama-moltbot-adapter"

[tool.hatch.build.targets.wheel]
packages = ["src/pisama_moltbot_adapter"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
