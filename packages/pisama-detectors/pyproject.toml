[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pisama-detectors"
version = "0.1.0"
description = "42 failure detectors for LLM agent systems — detect loops, hallucinations, injection, coordination failures, and more"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Pisama Team", email = "team@pisama.dev" }
]
keywords = [
    "ai", "agents", "testing", "failure-detection",
    "hallucination", "prompt-injection", "loop-detection",
    "multi-agent", "observability"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24.0",
]

[project.optional-dependencies]
embeddings = [
    "sentence-transformers>=2.2.0",
]
full = [
    "sentence-transformers>=2.2.0",
    "anthropic>=0.25.0",
]

[project.urls]
Homepage = "https://github.com/tn-pisama/pisama-detectors"
Documentation = "https://docs.pisama.com/detectors"

[tool.hatch.build.targets.wheel]
packages = ["src/pisama_detectors"]
