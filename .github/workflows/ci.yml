name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mao
          POSTGRES_PASSWORD: mao
          POSTGRES_DB: mao
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-ci.txt

      - name: Lint
        run: |
          pip install ruff
          cd backend
          ruff check app/ --select E,W,F --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://mao:mao@localhost:5432/mao
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: aB3kJ9mLpQ2vXnRw5zFcGhIe8tYo1uNiWdE7sH4jKlM
        run: |
          cd backend
          pytest --cov=app --cov-fail-under=70 tests/ -v

      - name: Security scan
        run: |
          pip install bandit safety
          cd backend
          bandit -r app/ -ll
          safety check -r requirements.txt || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend/'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build
