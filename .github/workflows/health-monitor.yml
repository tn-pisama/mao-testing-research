name: Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check production health
        id: health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 30 \
            https://mao-api.fly.dev/api/v1/health)
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          cat /tmp/health.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "healthy=false" >> $GITHUB_OUTPUT
          else
            STATUS=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "healthy" ]; then
              echo "healthy=true" >> $GITHUB_OUTPUT
            else
              echo "healthy=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create issue on failure
        if: steps.health.outputs.healthy == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const title = `Production health check failed (HTTP ${process.env.HTTP_CODE})`;
            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert',
              per_page: 5,
            });
            if (issues.data.length > 0) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Still failing at ${new Date().toISOString()} — HTTP ${process.env.HTTP_CODE}`,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Production health check failed.\n\n- **Endpoint:** https://mao-api.fly.dev/api/v1/health\n- **HTTP Code:** ${process.env.HTTP_CODE}\n- **Time:** ${new Date().toISOString()}\n\nCheck Fly.io logs: \`flyctl logs -a mao-api\``,
                labels: ['health-alert', 'production'],
              });
            }
        env:
          HTTP_CODE: ${{ steps.health.outputs.http_code }}
